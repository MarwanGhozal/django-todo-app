{% extends 'base.html' %}
{% block content %}
<div style="max-width:400px; margin:0 auto; text-align:center; padding-top:40px;">

    {% if request.user.is_authenticated %}
        <div style="font-size:36px; margin-bottom:16px; opacity:.4;">✓</div>
        <h4 class="fw-500 mb-1">Hello, {{ request.user.username }}</h4>
        <p class="text-muted small mb-4">Ready to get things done?</p>
        <a href="{% url 'taskList' %}" class="btn btn-primary px-4">Go to my tasks</a>

    {% else %}
        <div style="font-size:36px; margin-bottom:16px; opacity:.4;">🔒</div>
        <h4 class="fw-500 mb-1">Welcome to Todo App</h4>
        <p class="text-muted small mb-4">Sign in to manage your tasks.</p>
        <div class="d-flex justify-content-center gap-2">
            <a href="{% url 'login' %}" class="btn btn-primary px-4">Login</a>
            <a href="{% url 'register' %}" class="btn btn-outline-secondary px-4">Register</a>
        </div>
    {% endif %}

</div>
{% endblock %}
